<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Healthy Bites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>🥗 Global Healthy Bites</h1>
            <p>Etsi terveellisiä reseptejä ympäri maailmaa</p>
        </header>

        <div class="search-section">
            <input type="text" id="hakusana" placeholder="Kirjoita raaka-aine (esim. salmon, chicken)...">
            <button id="haku-nappi">Hae reseptit</button>
        </div>

        <div id="tulokset" class="recipe-grid">
            <p class="info-text">Kirjoita hakusana ja paina nappia aloittaaksesi!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
