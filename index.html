<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Healthy Bites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>🥗 Global Healthy Bites</h1>
            <p>Discover healthy recipes from around the world</p>
        </header>

        <div class="search-section">
            <input type="text" id="user-input" placeholder="Enter ingredient (e.g., salmon, beef)...">
            <button id="search-btn">Search Recipes</button>
        </div>

        </div>

        <div class="categories">
            <button class="category-btn" data-category="Seafood">Seafood</button>
            <button class="category-btn" data-category="Vegan">Vegan</button>
            <button class="category-btn" data-category="Beef">Beef</button>
            <button class="category-btn" data-category="Breakfast">Breakfast</button>
        </div>

        <div id="results" class="recipe-grid"></div>

        <div id="results" class="recipe-grid">
            <p class="info-text">Type something and press search to begin!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
